<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Web-telegram</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://telegram.org/img/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="main-wrapper">
        <div class="content-container">
            <div class="qr-box">
                <div class="qr-wrapper">
                    <img src="img/qr-code.png.png" alt="QR Code" class="qr-img">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="tg-mini-logo">
                </div>
                <h2>Log in to Telegram by QR Code</h2>
                <p>Scan this QR code with the Telegram app on your phone</p>
            </div>

            <div class="steps-box">
                <div class="step-item">
                    <span class="step-num">1</span>
                    <p>Open Telegram on your phone</p>
                </div>
                <div class="step-item">
                    <span class="step-num">2</span>
                    <p>Go to <strong>Settings > Devices > Link Desktop Device</strong></p>
                </div>
                <div class="step-item">
                    <span class="step-num">3</span>
                    <p>Point your phone at this screen to confirm login</p>
                </div>
            </div>

            <div class="action-links">
                <a href="https://web.telegram.org/a/#login" class="link-btn">LOG IN BY PHONE NUMBER</a>
                <a href="https://web.telegram.org/k/#passkey" class="link-btn">LOG IN WITH PASSKEY</a>
            </div>
            
            </div>
    </div>
</body>
</html>
